<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0071e3"/>
      <stop offset="100%" stop-color="#0055b3"/>
    </linearGradient>
  </defs>
  
  <!-- Squircle background -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)"/>
  
  <!-- Clipboard sheet -->
  <rect x="96" y="128" width="320" height="280" rx="32" ry="32" fill="#e8eef7"/>
  
  <!-- Top tab (clip) -->
  <rect x="156" y="96" width="200" height="48" rx="16" ry="16" fill="#f0f4fa"/>
  
  <!-- Zipper spine -->
  <line x1="256" y1="148" x2="256" y2="380" stroke="#0071e3" stroke-width="6" opacity="0.25"/>
  
  <!-- Left chevrons -->
  <line x1="256" y1="160" x2="220" y2="180" stroke="#0071e3" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="195" x2="220" y2="215" stroke="#0071e3" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="230" x2="220" y2="250" stroke="#0071e3" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="265" x2="220" y2="285" stroke="#0071e3" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="300" x2="220" y2="320" stroke="#0071e3" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="335" x2="220" y2="355" stroke="#0071e3" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Right chevrons -->
  <line x1="256" y1="175" x2="292" y2="195" stroke="#0071e3" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="210" x2="292" y2="230" stroke="#0071e3" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="245" x2="292" y2="265" stroke="#0071e3" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="280" x2="292" y2="300" stroke="#0071e3" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="315" x2="292" y2="335" stroke="#0071e3" stroke-width="8" stroke-linecap="round"/>
  
  <!-- ZL text -->
  <text x="256" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
        font-weight="800" font-size="48" fill="#0071e3" opacity="0.5" letter-spacing="4">ZL</text>
  
  <!-- Lock icon (bottom right) -->
  <rect x="330" y="350" width="50" height="36" rx="6" ry="6" fill="#30d158" opacity="0.8"/>
  <path d="M340 350 L340 340 Q340 325 355 325 Q370 325 370 340 L370 350" 
        fill="none" stroke="#30d158" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
</svg>
