name: Build & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Install npm dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Diagnose
        run: |
          rustc --version
          cargo --version
          ls -la src-tauri/
      - name: Run Rust tests
        run: |
          cd src-tauri && cargo test -- --test-threads=1 --nocapture 2>&1 | tee /tmp/test_output.txt
          echo "EXIT CODE: $?"
      - name: Dump test log
        if: failure()
        run: |
          echo "## 🔴 Linux Test Failure Log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 /tmp/test_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/test_output.txt
      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-test-log
          path: /tmp/test_output.txt
      - name: Build Rust (release)
        run: cd src-tauri && cargo build --release 2>&1
      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ziploom-linux
          path: src-tauri/target/release/ziploom-tauri

  test-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install npm dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Build Rust (release)
        run: cd src-tauri && cargo build --release 2>&1
      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ziploom-macos
          path: src-tauri/target/release/ziploom-tauri

  test-windows:
    name: Build (Windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc
      - name: Setup Visual Studio environment
        shell: pwsh
        run: |
          # Find and initialize VS dev environment
          $vswhere = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\vsdevcmd\core\vsdevcmd.core.bat"
          if (Test-Path $vswhere) {
            echo "Found VS2022 Enterprise"
            & cmd /c "call `"$vswhere`" -arch=x64 -host_arch=x64 && set" | ForEach-Object {
              if ($_ -match "^(.*?)=(.*)$") {
                [Environment]::SetEnvironmentVariable($matches[1], $matches[2], "Process")
              }
            }
          } else {
            echo "VS2022 Enterprise not found, trying Community..."
            $vswhere = "C:\Program Files\Microsoft Visual Studio\2022\Community\Common7\Tools\vsdevcmd\core\vsdevcmd.core.bat"
            if (Test-Path $vswhere) {
              & cmd /c "call `"$vswhere`" -arch=x64 -host_arch=x64 && set" | ForEach-Object {
                if ($_ -match "^(.*?)=(.*)$") {
                  [Environment]::SetEnvironmentVariable($matches[1], $matches[2], "Process")
                }
              }
            }
          }
          echo "LIB=[$env:LIB]"
          echo "PATH includes lib.exe: $(where.exe lib.exe 2>$null)"
      - name: Install npm dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Build Rust (release)
        shell: pwsh
        run: |
          # Initialize VS dev environment
          $vsCore = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\vsdevcmd\core\vsdevcmd.core.bat"
          if (!(Test-Path $vsCore)) {
            $vsCore = "C:\Program Files\Microsoft Visual Studio\2022\Community\Common7\Tools\vsdevcmd\core\vsdevcmd.core.bat"
          }
          if (Test-Path $vsCore) {
            Write-Host "Initializing VS environment from: $vsCore"
            & cmd /c "call `"$vsCore`" -arch=x64 -host_arch=x64 && cd /d src-tauri && cargo build --release --verbose 2>&1" | Tee-Object -FilePath "$env:TEMP\win_build.txt"
          } else {
            Write-Host "VS not found, trying direct build..."
            cd src-tauri
            cargo build --release --verbose 2>&1 | Tee-Object -FilePath "$env:TEMP\win_build.txt"
          }
          if ($LASTEXITCODE -ne 0) { throw "Build failed (exit $LASTEXITCODE)" }
      - name: Upload Windows build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-log
          path: /tmp/win_build.txt
      - name: Dump error to summary
        if: failure()
        run: |
          echo "## Windows Build Error Log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/win_build.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Upload Windows binary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ziploom-windows
          path: src-tauri/target/release/ziploom-tauri.exe

  bundle-linux:
    name: Bundle (Linux)
    needs: [test-linux]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Install npm dependencies
        run: npm ci
      - name: Build Tauri bundles
        run: npm run tauri -- build --bundles deb,appimage 2>&1
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: ziploom-deb
          path: src-tauri/target/release/bundle/deb/*.deb
      - name: Upload .AppImage
        uses: actions/upload-artifact@v4
        with:
          name: ziploom-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
