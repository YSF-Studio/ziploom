name: Build & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Install npm dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Diagnose
        run: |
          rustc --version
          cargo --version
          ls -la src-tauri/
      - name: Run Rust tests
        run: cd src-tauri && cargo test -- --test-threads=1 --nocapture 2>&1
      - name: Build Rust (release)
        run: cd src-tauri && cargo build --release 2>&1
      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ziploom-linux
          path: src-tauri/target/release/ziploom-tauri

  test-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install npm dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Build Rust (release)
        run: cd src-tauri && cargo build --release 2>&1
      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ziploom-macos
          path: src-tauri/target/release/ziploom-tauri

  test-windows:
    name: Build (Windows)
    runs-on: windows-2025
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc
      - name: Install npm dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Diagnose
        run: |
          rustc --version
          cargo --version
          rustup target list --installed
      - name: Build Rust (release)
        run: cd src-tauri && cargo build --release 2>&1
      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ziploom-windows
          path: src-tauri/target/release/ziploom-tauri.exe

  bundle-linux:
    name: Bundle (Linux)
    needs: [test-linux]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Install npm dependencies
        run: npm ci
      - name: Build Tauri bundles
        run: npm run tauri -- build --bundles deb,appimage 2>&1
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: ziploom-deb
          path: src-tauri/target/release/bundle/deb/*.deb
      - name: Upload .AppImage
        uses: actions/upload-artifact@v4
        with:
          name: ziploom-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
