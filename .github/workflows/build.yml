name: Build & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Manual trigger

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target/
            ~/.cargo/registry/
            ~/.cargo/git/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Cache Node dependencies
        uses: actions/cache@v4
        with:
          path: node_modules/
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install npm dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Run Rust tests
        run: cd src-tauri && cargo test
      - name: Build Rust (release)
        run: cd src-tauri && cargo build --release
      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: ziploom-linux
          path: src-tauri/target/release/ziploom-tauri

  test-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install npm dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Build Rust (release)
        run: cd src-tauri && cargo build --release
      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: ziploom-macos
          path: src-tauri/target/release/ziploom-tauri

  test-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install npm dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Build Rust (release)
        run: cd src-tauri && cargo build --release
      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: ziploom-windows
          path: src-tauri/target/release/ziploom-tauri.exe

  bundle-linux:
    name: Bundle (Linux .deb + .AppImage)
    needs: [test-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target/
            ~/.cargo/registry/
            ~/.cargo/git/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install npm dependencies
        run: npm ci
      - name: Build Tauri bundle
        run: npm run tauri -- build --bundles deb,appimage
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: ziploom-deb
          path: src-tauri/target/release/bundle/deb/*.deb
      - name: Upload .AppImage
        uses: actions/upload-artifact@v4
        with:
          name: ziploom-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
