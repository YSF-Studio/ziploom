name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Configure short Cargo target dir (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "CARGO_TARGET_DIR=C:\t" >> $env:GITHUB_ENV
          echo "CARGO_INCREMENTAL=0" >> $env:GITHUB_ENV
          echo "RUSTFLAGS=-C debuginfo=0" >> $env:GITHUB_ENV

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libpcap-dev

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: |
            src-tauri
            src-tauri/crates/ysf-core

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Build Frontend
        run: npm run build

      - name: Build ysf-core
        run: cargo build --manifest-path src-tauri/crates/ysf-core/Cargo.toml --locked --tests

      - name: Test ysf-core
        run: cargo test --manifest-path src-tauri/crates/ysf-core/Cargo.toml --locked -- --test-threads=2

      - name: Build Rust
        run: cargo build --manifest-path src-tauri/Cargo.toml --locked

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz | tar -xz
          sudo mv gitleaks /usr/local/bin/
      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --verbose

      - name: npm audit
        run: npm audit --audit-level=moderate

      - name: Cargo Audit
        run: |
          cargo install cargo-audit --locked
          cargo audit --manifest-path src-tauri/crates/ysf-core/Cargo.toml
          cargo audit --manifest-path src-tauri/Cargo.toml
