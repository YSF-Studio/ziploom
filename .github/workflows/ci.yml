name: CI/CD — Build, Test & Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gitleaks:
    name: 🔍 Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz | tar -xz
          sudo mv gitleaks /usr/local/bin/
      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --verbose

  core-test:
    name: 🧩 ysf-core Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev libssl-dev
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: src-tauri/crates/ysf-core
      - run: cargo test --manifest-path src-tauri/crates/ysf-core/Cargo.toml --locked

  ziploom:
    name: 📦 ZipLoom
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: |
            src-tauri
            src-tauri/crates/ysf-core
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libpcap-dev
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Build Frontend
        run: npm run build
      - name: Build Rust
        run: cargo build --manifest-path src-tauri/Cargo.toml --locked
      - name: IPC coverage check
        run: npm run test:ipc

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml --tests --locked

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: GUI smoke tests
        run: npm run test:gui

      - name: npm audit
        run: npm audit --audit-level=moderate
