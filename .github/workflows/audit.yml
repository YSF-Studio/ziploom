name: 🔒 Security Audit

on:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".gitleaks.toml"
  workflow_dispatch:

jobs:
  cargo-audit:
    name: 📋 Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: |
            src-tauri
            src-tauri/crates/ysf-core
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked 2>/dev/null || true
      - name: Audit Cargo projects
        run: |
          for dir in src-tauri/crates/ysf-core src-tauri; do
            if [ -f "$dir/Cargo.toml" ]; then
              echo "=== Auditing $dir ==="
              (cd "$dir" && cargo audit)
            fi
          done

  sbom:
    name: 📦 SBOM Generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked 2>/dev/null || true
      - name: Generate SBOM
        continue-on-error: true
        run: |
          for dir in src-tauri/crates/ysf-core src-tauri; do
            if [ -f "$dir/Cargo.toml" ]; then
              echo "=== SBOM for $dir ==="
              cd "$dir" && cargo cyclonedx 2>&1 || true
              cd - >/dev/null
            fi
          done
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: "**/*.cdx.xml"
          retention-days: 30
