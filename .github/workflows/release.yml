name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-release:
    name: Release (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Configure short Cargo target dir (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "CARGO_TARGET_DIR=C:\t" >> $env:GITHUB_ENV
          echo "CARGO_INCREMENTAL=0" >> $env:GITHUB_ENV
          echo "RUSTFLAGS=-C debuginfo=0" >> $env:GITHUB_ENV

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libpcap-dev zip

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: |
            src-tauri
            src-tauri/crates/ysf-core

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Build installers and portable packages
        run: npm run tauri:build

      - name: Upload release artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v5
        with:
          name: release-linux
          path: src-tauri/target/release/bundle/releases/*

      - name: Upload release artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v5
        with:
          name: release-macos
          path: src-tauri/target/release/bundle/releases/*

      - name: Upload release artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v5
        with:
          name: release-windows
          path: C:\t\release\bundle\releases\*

  publish:
    name: Publish GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
