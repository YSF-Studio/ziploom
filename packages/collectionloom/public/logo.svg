<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="grain"/>
    </filter>
  </defs>

  <!-- Outer rounded square background -->
  <rect x="8" y="8" width="496" height="496" rx="72" fill="#0b1f3a" stroke="#3a5a8a" stroke-width="3"/>

  <!-- CST Monogram -->
  <g transform="translate(60,65)" filter="url(#grain)">
    <!-- C letter -->
    <g fill="#0a0e16" stroke="#5a8aaa" stroke-width="3.5" stroke-linejoin="miter">
      <!-- C top horizontal -->
      <polygon points="30,20 250,20 250,55 50,55 50,70 30,70"/>
      <!-- C left vertical -->
      <polygon points="30,70 50,70 50,310 30,310"/>
      <!-- C bottom curve -->
      <polygon points="30,310 50,310 50,330 70,345 70,370 30,370"/>
      <!-- C right vertical (partial, with cutouts for S and T) -->
      <polygon points="230,55 250,55 250,310 230,310"/>
    </g>

    <!-- S letter (interlocking) -->
    <g fill="#0a0e16" stroke="#6a9aba" stroke-width="3">
      <!-- S top horizontal -->
      <polygon points="90,20 220,20 220,45 110,45 110,55 90,55"/>
      <!-- S diagonal middle -->
      <polygon points="90,55 110,55 190,340 170,340"/>
      <!-- S bottom horizontal -->
      <polygon points="130,340 260,340 260,365 150,365 150,355 130,355"/>
    </g>

    <!-- T letter (integrated) -->
    <g fill="#0a0e16" stroke="#7a9aba" stroke-width="3">
      <!-- T top bar -->
      <polygon points="160,20 370,20 370,45 270,45 270,65 160,65"/>
      <!-- T vertical stem -->
      <polygon points="260,45 280,45 280,370 260,370"/>
    </g>

    <!-- Style accents (small rectangles) -->
    <rect x="140" y="130" width="16" height="16" fill="#0a0e16" stroke="#5a8aaa" stroke-width="2"/>
    <rect x="210" y="250" width="16" height="16" fill="#0a0e16" stroke="#5a8aaa" stroke-width="2"/>
  </g>
</svg>
